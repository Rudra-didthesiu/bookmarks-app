<h1>Bookmarks App</h1>

<input
  type="text"
  placeholder="Search bookmarks..."
  [(ngModel)]="searchQuery"
  (input)="onSearch()">

<br><br>

<input
  type="text"
  placeholder="Title"
  [(ngModel)]="title">

<br><br>

<input
  type="text"
  placeholder="URL"
  [(ngModel)]="url">

<input
  type="text"
  placeholder="Category"
  [(ngModel)]="category">

<br><br>

<button (click)="addBookmark()">
  Add Bookmark
</button>

<hr>

<ul>
  @for (bookmark of bookmarks; track bookmark.id) {
   <li>
   {{ bookmark.title }} - {{ bookmark.url }} - {{ bookmark.category }}

    <button (click)="deleteBookmark(bookmark.id)">
      Delete
    </button>
   </li>
  }
</ul>
